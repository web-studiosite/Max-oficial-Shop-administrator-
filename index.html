<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Shop Administration - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-icon-lg">OS</div>
        <h1>Official Shop Administration</h1>
        <p>Sistema de Gestão ERP</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
        <button class="tab-btn" onclick="switchTab('register')">Registar</button>
      </div>

      <div id="login-panel" class="tab-panel active">
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="login-email" required placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-input" id="login-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-full" style="margin-top:8px;">
            <span id="login-spinner" class="loading-spinner hidden" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px;"></span>
            Entrar no Sistema
          </button>
        </form>
      </div>

      <div id="register-panel" class="tab-panel">
        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-input" id="reg-name" required placeholder="Seu nome">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="reg-email" required placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-input" id="reg-password" required placeholder="Mínimo 6 caracteres" minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">Perfil</label>
            <select class="form-select" id="reg-role">
              <option value="cashier">Operador de Caixa</option>
              <option value="junior_admin">Administrador Júnior</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-full" style="margin-top:8px;">
            Criar Conta
          </button>
        </form>
      </div>

      <div id="error-box" style="display:none;color:red;text-align:center;margin-top:10px;padding:10px;background:#ffe0e0;border-radius:5px;"></div>

      <div style="text-align:center;margin-top:20px;font-size:12px;color:#888;">
        <p>© 2025 Official Shop Administration. ERP Profissional.</p>
      </div>
    </div>
  </div>

  <!-- ========== CONFIGURAÇÃO DO TEU SUPABASE ========== -->
  <script>
    const SUPABASE_URL = 'https://xkckgzxtsiwoqqvopnkn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_juqKcXrT73-MdSf0qERjyQ_g1GHZoGQ';
    let supabase = null;

    function initSupabase() {
      if (!supabase) {
        if (typeof window.supabase !== 'undefined' && typeof window.supabase.createClient === 'function') {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else {
          document.getElementById('error-box').textContent = 'ERRO: Supabase SDK não carregado. Recarrega a página.';
          document.getElementById('error-box').style.display = 'block';
          throw new Error('Supabase SDK não carregado');
        }
      }
      return supabase;
    }

    function getSupabase() {
      if (!supabase) initSupabase();
      return supabase;
    }

    async function signIn(email, password) {
      const sb = getSupabase();
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      return data;
    }

    async function signUp(email, password, userData) {
      const sb = getSupabase();
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: userData } });
      if (error) throw error;
      return data;
    }

    async function signOut() {
      const sb = getSupabase();
      await sb.auth.signOut();
      localStorage.removeItem('currentUser');
      sessionStorage.removeItem('cashierOpen');
      window.location.href = 'index.html';
    }

    async function getCurrentUser() {
      const sb = getSupabase();
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return null;
      try {
        const { data: profile } = await sb.from('users').select('*').eq('id', user.id).single();
        if (profile) {
          localStorage.setItem('currentUser', JSON.stringify(profile));
          return profile;
        }
      } catch (e) {}
      return { id: user.id, email: user.email, name: user.email, role: 'cashier' };
    }

    function getStoredUser() {
      try { return JSON.parse(localStorage.getItem('currentUser')); } catch { return null; }
    }

    function hasRole(role) {
      const user = getStoredUser();
      return user && user.role === role;
    }

    function requireAuth() {
      const user = getStoredUser();
      if (!user) { window.location.href = 'index.html'; return false; }
      return user;
    }

    function requireAdmin() {
      const user = requireAuth();
      if (!user) return false;
      if (user.role !== 'admin' && user.role !== 'junior_admin') { window.location.href = 'index.html'; return false; }
      return user;
    }

    function requireCashier() {
      const user = requireAuth();
      if (!user) return false;
      if (user.role !== 'cashier' && user.role !== 'admin' && user.role !== 'junior_admin') { window.location.href = 'index.html'; return false; }
      return user;
    }

    async function fetchAll(table, options = {}) {
      const sb = getSupabase();
      let query = sb.from(table).select(options.select || '*');
      if (options.eq) query = query.eq(options.eq.column, options.eq.value);
      if (options.order) query = query.order(options.order.column, { ascending: options.order.ascending ?? false });
      if (options.limit) query = query.limit(options.limit);
      const { data, error } = await query;
      if (error) throw error;
      return data || [];
    }

    async function fetchById(table, id) {
      const sb = getSupabase();
      const { data, error } = await sb.from(table).select('*').eq('id', id).single();
      if (error) throw error;
      return data;
    }

    async function insertRecord(table, record) {
      const sb = getSupabase();
      const { data, error } = await sb.from(table).insert(record).select().single();
      if (error) throw error;
      return data;
    }

    async function updateRecord(table, id, record) {
      const sb = getSupabase();
      const { data, error } = await sb.from(table).update(record).eq('id', id).select().single();
      if (error) throw error;
      return data;
    }

    async function deleteRecord(table, id) {
      const sb = getSupabase();
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) throw error;
    }

    function subscribeToTable(table, callback) {
      const sb = getSupabase();
      return sb.channel(table + '_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table }, callback)
        .subscribe();
    }

    async function logAudit(action, tableName, beforeData, afterData) {
      const user = getStoredUser();
      try {
        await insertRecord('audit_logs', {
          user_id: user?.id || null,
          action,
          table_name: tableName,
          before_data: beforeData ? JSON.stringify(beforeData) : null,
          after_data: afterData ? JSON.stringify(afterData) : null
        });
      } catch (e) { console.error('Audit log error:', e); }
    }

    const OFFLINE_QUEUE_KEY = 'offline_queue';
    function getOfflineQueue() {
      try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)) || []; } catch { return []; }
    }
    function addToOfflineQueue(operation) {
      const queue = getOfflineQueue();
      queue.push({ ...operation, timestamp: new Date().toISOString() });
      localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
    }
    async function syncOfflineQueue() {
      const queue = getOfflineQueue();
      if (!queue.length) return;
      const sb = getSupabase();
      for (const op of queue) {
        try {
          if (op.type === 'insert') await sb.from(op.table).insert(op.record);
          else if (op.type === 'update') await sb.from(op.table).update(op.record).eq('id', op.id);
          else if (op.type === 'delete') await sb.from(op.table).delete().eq('id', op.id);
        } catch (e) { console.error('Sync error:', e); }
      }
      localStorage.removeItem(OFFLINE_QUEUE_KEY);
      if (typeof showToast !== 'undefined') showToast('info', queue.length + ' operações sincronizadas');
    }
    function isOnline() { return navigator.onLine; }

    window.SUPABASE_URL = SUPABASE_URL;
    window.SUPABASE_KEY = SUPABASE_KEY;
    window.initSupabase = initSupabase;
    window.getSupabase = getSupabase;
    window.signIn = signIn;
    window.signUp = signUp;
    window.signOut = signOut;
    window.getCurrentUser = getCurrentUser;
    window.getStoredUser = getStoredUser;
    window.hasRole = hasRole;
    window.requireAuth = requireAuth;
    window.requireAdmin = requireAdmin;
    window.requireCashier = requireCashier;
    window.fetchAll = fetchAll;
    window.fetchById = fetchById;
    window.insertRecord = insertRecord;
    window.updateRecord = updateRecord;
    window.deleteRecord = deleteRecord;
    window.subscribeToTable = subscribeToTable;
    window.logAudit = logAudit;
    window.getOfflineQueue = getOfflineQueue;
    window.addToOfflineQueue = addToOfflineQueue;
    window.syncOfflineQueue = syncOfflineQueue;
    window.isOnline = isOnline;
  </script>

  <!-- ========== LÓGICA DA PÁGINA ========== -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initSupabase();
      checkSession();
    });

    async function checkSession() {
      try {
        const user = await getCurrentUser();
        if (user) {
          if (user.role === 'admin' || user.role === 'junior_admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'cashier.html';
          }
        }
      } catch (err) {
        console.log('Sem sessão ativa');
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('login-panel').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('register-panel').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const spinner = document.getElementById('login-spinner');
      spinner.classList.remove('hidden');
      document.getElementById('error-box').style.display = 'none';
      try {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        await signIn(email, password);
        const user = await getCurrentUser();
        if (typeof showToast !== 'undefined') showToast('success', 'Bem-vindo, ' + (user.name || user.email) + '!');
        setTimeout(() => {
          if (user.role === 'admin' || user.role === 'junior_admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'cashier.html';
          }
        }, 500);
      } catch (err) {
        document.getElementById('error-box').textContent = err.message || 'Erro ao entrar';
        document.getElementById('error-box').style.display = 'block';
      } finally {
        spinner.classList.add('hidden');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      document.getElementById('error-box').style.display = 'none';
      try {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const role = document.getElementById('reg-role').value;
        if (!name) throw new Error('Nome é obrigatório');
        if (!email) throw new Error('Email é obrigatório');
        if (!password || password.length < 6) throw new Error('Senha deve ter no mínimo 6 caracteres');
        const { data: authData, error: authError } = await getSupabase().auth.signUp({
          email, password,
          options: { data: { name, role } }
        });
        if (authError) throw authError;
        if (authData.user) {
          await insertRecord('users', {
            id: authData.user.id,
            name: name,
            email: email,
            role: role
          });
        }
        if (typeof showToast !== 'undefined') showToast('success', 'Conta criada com sucesso! Verifique seu email.');
        switchTab('login');
      } catch (err) {
        document.getElementById('error-box').textContent = err.message || 'Erro ao registar';
        document.getElementById('error-box').style.display = 'block';
      }
    }
  </script>
